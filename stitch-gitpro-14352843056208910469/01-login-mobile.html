<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Connect to Azure DevOps</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed": "#e4e2e1",
              "on-surface-variant": "#404752",
              "tertiary-fixed-dim": "#ffb689",
              "on-primary-fixed-variant": "#004883",
              "outline": "#717783",
              "tertiary-fixed": "#ffdbc8",
              "on-secondary-fixed-variant": "#474746",
              "surface-variant": "#e3e2e1",
              "surface-container-low": "#f4f3f2",
              "on-primary-fixed": "#001c39",
              "secondary-fixed-dim": "#c8c6c5",
              "primary-fixed-dim": "#a3c9ff",
              "on-error-container": "#93000a",
              "on-secondary-fixed": "#1b1c1c",
              "inverse-primary": "#a3c9ff",
              "surface-container-high": "#e9e8e7",
              "primary-fixed": "#d3e3ff",
              "on-tertiary-fixed-variant": "#743500",
              "tertiary": "#974700",
              "error-container": "#ffdad6",
              "primary": "#005faa",
              "background": "#faf9f8",
              "on-error": "#ffffff",
              "on-primary": "#ffffff",
              "secondary-container": "#e4e2e1",
              "primary-container": "#0078d4",
              "on-primary-container": "#ffffff",
              "surface-container": "#efeeed",
              "tertiary-container": "#bc5b00",
              "inverse-surface": "#2f3130",
              "secondary": "#5f5e5e",
              "surface": "#faf9f8",
              "surface-container-lowest": "#ffffff",
              "on-secondary": "#ffffff",
              "error": "#ba1a1a",
              "surface-bright": "#faf9f8",
              "on-tertiary-fixed": "#311300",
              "surface-container-highest": "#e3e2e1",
              "inverse-on-surface": "#f1f0ef",
              "outline-variant": "#c0c7d4",
              "on-tertiary-container": "#ffffff",
              "on-tertiary": "#ffffff",
              "surface-tint": "#0060ab",
              "surface-dim": "#dadad9",
              "on-secondary-container": "#656464",
              "on-surface": "#1a1c1c",
              "on-background": "#1a1c1c"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(227, 226, 225, 0.8);
            backdrop-filter: blur(12px);
        }
        .gradient-button {
            background: linear-gradient(135deg, #005faa 0%, #0078d4 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface min-h-screen flex flex-col items-center justify-center p-6">
<!-- Brand Identity Anchor -->
<header class="w-full max-w-sm mb-12 flex flex-col items-center">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-6 shadow-[0_8px_24px_rgba(0,95,170,0.15)]">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="account_tree">account_tree</span>
</div>
<h1 class="font-headline text-2xl font-extrabold tracking-tight text-on-surface text-center">
            The Architectural Ledger
        </h1>
<p class="font-body text-sm text-outline mt-2 text-center">
            Securely manage your Azure DevOps Pull Requests with precision.
        </p>
</header>
<!-- Main Login Canvas -->
<main class="w-full max-w-sm">
<div class="bg-surface-container-low rounded-xl p-8 shadow-sm">
<div class="mb-8">
<h2 class="font-headline text-lg font-semibold text-on-surface mb-1">Welcome Back</h2>
<p class="font-body text-sm text-on-surface-variant">Authentication required to access repositories.</p>
</div>
<!-- Input Section -->
<div class="space-y-6">
<div class="group">
<label class="font-label text-[0.6875rem] font-bold uppercase tracking-wider text-outline mb-2 block" for="pat-input">
                        Personal Access Token (PAT)
                    </label>
<div class="relative">
<input class="w-full bg-surface-container-highest text-on-surface border-none rounded-lg px-4 py-3 text-sm focus:ring-0 focus:border-primary-container border-b-2 border-transparent focus:border-b-primary-container transition-all placeholder:text-outline/50" id="pat-input" placeholder="Enter your Azure PAT..." type="password"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-outline text-lg" data-icon="key">key</span>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="gradient-button w-full py-4 rounded-xl text-on-primary font-semibold text-sm tracking-wide shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Connect</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Helpful Links -->
<div class="pt-4 flex flex-col items-center gap-4">
<button class="text-primary font-label text-[0.6875rem] font-bold uppercase tracking-widest hover:opacity-80 transition-opacity">
                        Where do I find my PAT?
                    </button>
<div class="flex items-center gap-2 w-full px-4">
<div class="h-[1px] bg-outline-variant/20 flex-grow"></div>
<span class="font-label text-[0.6rem] text-outline uppercase tracking-tighter">OR</span>
<div class="h-[1px] bg-outline-variant/20 flex-grow"></div>
</div>
<button class="w-full py-3 border border-outline-variant/20 rounded-xl bg-surface-container-lowest text-on-surface font-semibold text-xs flex items-center justify-center gap-2 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="domain">domain</span>
                        Enterprise Login
                    </button>
</div>
</div>
</div>
<!-- System Status / Info -->
<footer class="mt-12 space-y-8">
<div class="flex items-center justify-center gap-6 opacity-40 grayscale">
<div class="h-6 w-auto" style="aspect-ratio: 3/1; background-color: #717783; mask-image: url('https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg'); mask-repeat: no-repeat; mask-size: contain;"></div>
</div>
<p class="font-body text-[0.65rem] text-center text-outline leading-relaxed px-4">
                By connecting, you agree to the <span class="text-on-surface font-semibold">Terms of Service</span> and <span class="text-on-surface font-semibold">Privacy Policy</span>. Data is encrypted in transit and at rest.
            </p>
</footer>
</main>
<!-- Background Decoration (Architectural Layers) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[10%] w-[60%] h-[40%] bg-primary-container/5 rounded-full blur-[120px]"></div>
<div class="absolute top-[60%] -left-[10%] w-[50%] h-[50%] bg-tertiary/5 rounded-full blur-[100px]"></div>
</div>
</body></html>
