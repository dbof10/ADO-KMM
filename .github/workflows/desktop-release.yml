# Manual desktop installers (Compose Desktop native distributions).
# Produces DMG (macOS), MSI (Windows), and DEB (Ubuntu) and uploads them as workflow artifacts.
name: Desktop release build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: All modules check (tests & lint)
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Strip missing corporate truststore from Gradle JVM args (CI)
        run: |
          python3 << 'PY'
          from pathlib import Path
          p = Path("gradle.properties")
          text = p.read_text()
          suffix = "-Djavax.net.ssl.trustStore=gradle/ado-desktop-chs-truststore.jks -Djavax.net.ssl.trustStorePassword=changeit"
          if suffix in text:
              p.write_text(text.replace(suffix, "").rstrip() + "\n")
          PY

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run checks for all modules
        run: ./gradlew check --no-daemon --stacktrace

  package:
    name: Package ${{ matrix.name }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            runner: macos-latest
            task: packageReleaseDmg
            artifact_name: ado-desktop-macos-dmg
            files: composeApp/build/compose/binaries/main-release/dmg/*
          - name: Windows MSI
            runner: windows-latest
            task: packageReleaseMsi
            artifact_name: ado-desktop-windows-msi
            files: composeApp/build/compose/binaries/main-release/msi/*
          - name: Linux DEB
            runner: ubuntu-latest
            task: packageReleaseDeb
            artifact_name: ado-desktop-linux-deb
            files: composeApp/build/compose/binaries/main-release/deb/*

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Strip missing corporate truststore from Gradle JVM args (CI)
        run: |
          python3 << 'PY'
          from pathlib import Path
          p = Path("gradle.properties")
          text = p.read_text()
          suffix = "-Djavax.net.ssl.trustStore=gradle/ado-desktop-chs-truststore.jks -Djavax.net.ssl.trustStorePassword=changeit"
          if suffix in text:
              p.write_text(text.replace(suffix, "").rstrip() + "\n")
          PY

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Package ${{ matrix.name }}
        run: ./gradlew :composeApp:${{ matrix.task }} --no-daemon --stacktrace

      - name: Upload ${{ matrix.name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.files }}
          if-no-files-found: error
